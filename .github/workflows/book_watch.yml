name: Daily Rare Book Watch

on:
  schedule:
    # Runs at 07:00 UTC every day. Adjust to your timezone --
    # e.g. for 7am US Eastern (UTC-4/UTC-5), use "0 11 * * *" or "0 12 * * *".
    - cron: "0 12 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit seen_listings.json

jobs:
  check-books:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run book watcher
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python book_watcher.py

      - name: Save seen-listings state
        run: |
          git config user.name "book-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_listings.json
          git diff --quiet --cached || git commit -m "Update seen listings [skip ci]"
          git push
